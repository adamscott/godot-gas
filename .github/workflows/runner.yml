name: "Main Workflow"

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}|${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  static-checks:
    if: "${{ !vars.DISABLE_GODOT_GAS_CI || github.run_attempt > 1 || github.event_name == 'workflow_dispatch' }}"
    name: "Static Checks"
    uses: "./.github/workflows/static_checks.yml"
